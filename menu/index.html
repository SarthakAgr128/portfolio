<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu · Sarthak Agrawal</title>
  <meta name="description" content="Navigate through Sarthak Agrawal's portfolio - explore different sections and experiences.">
  <meta name="theme-color" content="#000000">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">

  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/menu.css">
</head>
<body>
  <a href="#main" class="skip-link">Skip to content</a>

  <!-- Tubes 3D Background -->
  <canvas id="tubes-canvas" aria-hidden="true"></canvas>
  
  <!-- Color reflection layer (dynamically tinted) -->
  <div class="color-reflection" id="color-reflection" aria-hidden="true"></div>

  <!-- Back Button -->
  <a href="../" class="back-btn" aria-label="Go back home">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
    <span>Back</span>
  </a>

  <!-- Click hint -->
  <div class="click-hint" id="click-hint">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 19V5M5 12l7-7 7 7"/>
    </svg>
    <span>Click anywhere to change colors</span>
  </div>

  <main id="main">
    <!-- Liquid Glass Menu Container -->
    <div class="liquid-glass-container">
      <div class="liquid-glass-menu" id="liquid-glass-menu">
        <!-- Glass reflection layers -->
        <div class="glass-reflection glass-reflection--1" aria-hidden="true"></div>
        <div class="glass-reflection glass-reflection--2" aria-hidden="true"></div>
        
        <!-- Menu Content -->
        <nav class="flowing-menu__nav">
          
          <!-- Home -->
          <div class="menu-item" data-image="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=600&h=400&auto=format&fit=crop">
            <a href="../" class="menu-item__link">
              <span class="menu-item__text">Home</span>
            </a>
            <div class="menu-item__marquee">
              <div class="menu-item__marquee-inner"></div>
            </div>
          </div>

          <!-- Home2 (New Design) -->
          <div class="menu-item" data-image="https://images.unsplash.com/photo-1558591710-4b4a1ae0f04d?q=80&w=600&h=400&auto=format&fit=crop">
            <a href="../home2/" class="menu-item__link">
              <span class="menu-item__text">Home v2</span>
            </a>
            <div class="menu-item__marquee">
              <div class="menu-item__marquee-inner"></div>
            </div>
          </div>

          <!-- Work Profile -->
          <div class="menu-item" data-image="https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=600&h=400&auto=format&fit=crop">
            <a href="../workprofile/" class="menu-item__link">
              <span class="menu-item__text">Work</span>
            </a>
            <div class="menu-item__marquee">
              <div class="menu-item__marquee-inner"></div>
            </div>
          </div>

          <!-- Moncy -->
          <div class="menu-item" data-image="https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?q=80&w=600&h=400&auto=format&fit=crop">
            <a href="../moncy/" class="menu-item__link">
              <span class="menu-item__text">Moncy</span>
            </a>
            <div class="menu-item__marquee">
              <div class="menu-item__marquee-inner"></div>
            </div>
          </div>

          <!-- Interesting -->
          <div class="menu-item" data-image="https://images.unsplash.com/photo-1635070041078-e363dbe005cb?q=80&w=600&h=400&auto=format&fit=crop">
            <a href="../interesting/" class="menu-item__link">
              <span class="menu-item__text">Interesting</span>
            </a>
            <div class="menu-item__marquee">
              <div class="menu-item__marquee-inner"></div>
            </div>
          </div>

        </nav>
      </div>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script type="module" src="../js/menu.js"></script>
</body>
</html>
