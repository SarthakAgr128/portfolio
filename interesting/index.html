<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sarthak Agrawal</title>
  <meta name="description" content="Sarthak Agrawal - Security Engineer, Problem Solver, Builder">
  <meta name="theme-color" content="#000000">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">

  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      height: 100%;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #000;
      color: #fff;
      overflow-x: hidden;
    }

    .scroll-spacer {
      height: 400vh;
      position: relative;
    }

    /* ─── Tubes canvas wrapper ─── */
    .tubes-wrapper {
      position: fixed;
      inset: 0;
      z-index: 1;
      overflow: hidden;
    }

    #tubes-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    /* ─── Center text: single element, always centered ─── */
    .center-text {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      pointer-events: none;
      padding: 0 2rem;
    }

    .center-text-inner {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(1.5rem, 4vw, 3.5rem);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: -0.02em;
      line-height: 1.15;
      text-shadow: 0 0 60px rgba(0, 0, 0, 0.8);
      user-select: none;
      color: #fff;
    }

    .center-text-inner .char-glitch {
      color: rgba(255, 255, 255, 0.3);
    }

    .tagline {
      margin-top: 1.5rem;
      font-size: clamp(0.875rem, 2vw, 1.25rem);
      font-weight: 400;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .hint {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 15;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      color: rgba(255, 255, 255, 0.3);
      font-size: 0.6875rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      animation: pulse 2s ease-in-out infinite;
      pointer-events: none;
    }

    .hint svg {
      width: 20px;
      height: 20px;
      opacity: 0.5;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.6; }
    }

    .scroll-indicator {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      pointer-events: none;
    }

    .scroll-indicator span {
      font-size: 0.625rem;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      color: rgba(255,255,255,0.4);
    }

    .scroll-indicator .scroll-line {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.4), transparent);
      animation: scrollPulse 2s ease-in-out infinite;
    }

    @keyframes scrollPulse {
      0%, 100% { transform: scaleY(1); opacity: 0.4; }
      50% { transform: scaleY(1.3); opacity: 0.8; }
    }

    .back-link {
      position: fixed;
      top: 2rem;
      left: 2rem;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.25rem;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 9999px;
      color: #fff;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.3s ease;
      pointer-events: auto;
    }

    .back-link:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
    }

    .back-link svg {
      width: 16px;
      height: 16px;
      transition: transform 0.3s ease;
    }

    .back-link:hover svg {
      transform: translateX(-3px);
    }

    /* ─── Force field layer ─── */
    .forcefield-layer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: 100vh;
      z-index: 5;
      transform: translateY(100%);
      will-change: transform;
    }

    #forcefield-container {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #forcefield-container canvas {
      display: block;
    }

    @media (max-width: 768px) {
      .back-link {
        top: 1rem;
        left: 1rem;
        padding: 0.625rem;
      }

      .back-link span {
        display: none;
      }

      .tagline {
        padding: 0 1rem;
      }
    }
  </style>
</head>
<body>

  <a href="../" class="back-link">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
    <span>Back</span>
  </a>

  <div class="scroll-spacer"></div>

  <!-- Tubes: wrapper div is fixed, canvas inside fills it -->
  <div class="tubes-wrapper" id="tubes-wrapper">
    <canvas id="tubes-canvas" aria-hidden="true"></canvas>
  </div>

  <!-- Single centered text element — morphs in place -->
  <div class="center-text" id="center-text">
    <div class="center-text-inner" id="center-text-inner">SARTHAK<br>AGRAWAL</div>
    <p class="tagline" id="hero-tagline">Security Engineer · Problem Solver · Builder</p>
  </div>

  <div class="hint" id="hint-click">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 5v14M5 12l7-7 7 7"/>
    </svg>
    <span>Click to change colors</span>
  </div>

  <div class="scroll-indicator" id="scroll-indicator">
    <span>Scroll</span>
    <div class="scroll-line"></div>
  </div>

  <!-- Force field slides up -->
  <div class="forcefield-layer" id="forcefield-layer">
    <div id="forcefield-container"></div>
  </div>


  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>

  <!-- ════════════════════════════════════════════ -->
  <!-- Tubes (original logic, restored)            -->
  <!-- ════════════════════════════════════════════ -->
  <script type="module">
    const TubesBackground = {
      app: null,
      canvas: null,
      currentColors: {
        tubes: ['#f967fb', '#53bc28', '#6958d5'],
        lights: ['#83f36e', '#fe8a2e', '#ff008a', '#60aed5']
      },

      async init() {
        this.canvas = document.getElementById('tubes-canvas');
        if (!this.canvas) return;

        try {
          const module = await import('https://cdn.jsdelivr.net/npm/threejs-components@0.0.19/build/cursors/tubes1.min.js');
          const TubesCursor = module.default;

          this.app = TubesCursor(this.canvas, {
            tubes: {
              colors: this.currentColors.tubes,
              lights: {
                intensity: 200,
                colors: this.currentColors.lights
              }
            }
          });

          this.bindClickHandler();
          console.log('%c🎨 Tubes initialized', 'font-size: 12px; color: #f967fb;');
        } catch (error) {
          console.warn('Tubes not available:', error);
          document.body.style.background = 'linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f1a 100%)';
        }
      },

      randomColors(count) {
        const colors = [];
        const hueRanges = [[280, 320], [100, 160], [200, 260], [0, 40]];
        for (let i = 0; i < count; i++) {
          const range = hueRanges[i % hueRanges.length];
          const hue = Math.floor(Math.random() * (range[1] - range[0]) + range[0]);
          const sat = Math.floor(Math.random() * 30 + 70);
          const light = Math.floor(Math.random() * 20 + 50);
          colors.push(`hsl(${hue}, ${sat}%, ${light}%)`);
        }
        return colors;
      },

      hslToHex(hsl) {
        const match = hsl.match(/hsl\((\d+),\s*(\d+)%,\s*(\d+)%\)/);
        if (!match) return hsl;
        let [, h, s, l] = match.map(Number);
        s /= 100; l /= 100;
        const c = (1 - Math.abs(2 * l - 1)) * s;
        const x = c * (1 - Math.abs((h / 60) % 2 - 1));
        const m = l - c / 2;
        let r = 0, g = 0, b = 0;
        if (h < 60) { r = c; g = x; }
        else if (h < 120) { r = x; g = c; }
        else if (h < 180) { g = c; b = x; }
        else if (h < 240) { g = x; b = c; }
        else if (h < 300) { r = x; b = c; }
        else { r = c; b = x; }
        return '#' + [r, g, b].map(v =>
          Math.round((v + m) * 255).toString(16).padStart(2, '0')
        ).join('');
      },

      randomize() {
        if (!this.app) return;
        const tubeColors = this.randomColors(3).map(c => this.hslToHex(c));
        const lightColors = this.randomColors(4).map(c => this.hslToHex(c));
        this.app.tubes.setColors(tubeColors);
        this.app.tubes.setLightsColors(lightColors);
      },

      bindClickHandler() {
        document.addEventListener('click', (e) => {
          if (e.target.closest('a')) return;
          this.randomize();
        });
      }
    };

    TubesBackground.init();
  </script>

  <!-- ════════════════════════════════════════════ -->
  <!-- Scroll choreography + in-place text morph   -->
  <!-- ════════════════════════════════════════════ -->
  <script>
    (function () {
      const GLYPHS = '0123456789ABCDEFabcdef!@#$%^&*<>{}[]|/\\~';
      const TEXT_A = 'SARTHAK\nAGRAWAL';
      const TEXT_B = "Who said cyber\nsecurity nerds can't\nbe creative?";

      const textInner = document.getElementById('center-text-inner');
      const tagline = document.getElementById('hero-tagline');
      const hintClick = document.getElementById('hint-click');
      const scrollIndicator = document.getElementById('scroll-indicator');
      const forcefieldLayer = document.getElementById('forcefield-layer');
      const tubesWrapper = document.getElementById('tubes-wrapper');

      /*
       * SCROLL TIMELINE (400vh):
       *
       * 0–0.15:     Hero. "SARTHAK AGRAWAL" static.
       * 0.10–0.18:  Tagline fades out.
       * 0.15–0.40:  Scramble A → B (long, requires significant scrolling).
       * 0.40–0.55:  Hold B. Force field starts sliding in at 0.40.
       * 0.55–0.82:  Scramble B → A (long).
       * 0.82–1.0:   "SARTHAK AGRAWAL" on force field.
       * 0.40–0.80:  Force field slides up.
       * 0.45–0.85:  Tubes clip from bottom.
       */

      let currentMode = 'hero';

      function clamp01(v) {
        return Math.max(0, Math.min(1, v));
      }

      function remap(value, inLow, inHigh, outLow, outHigh) {
        const t = clamp01((value - inLow) / (inHigh - inLow));
        return outLow + (outHigh - outLow) * t;
      }

      function easeInOutCubic(t) {
        return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
      }

      function renderText(from, to, progress) {
        const fromChars = from.split('');
        const toChars = to.split('');
        const maxLen = Math.max(fromChars.length, toChars.length);

        let html = '';
        for (let i = 0; i < maxLen; i++) {
          const fromC = i < fromChars.length ? fromChars[i] : ' ';
          const toC = i < toChars.length ? toChars[i] : ' ';

          const charProgress = clamp01((progress - (i / maxLen) * 0.6) / 0.4);

          let resolved;
          if (charProgress <= 0) {
            resolved = fromC;
          } else if (charProgress >= 1) {
            resolved = toC;
          } else {
            resolved = null;
          }

          if (resolved !== null) {
            if (resolved === '\n') { html += '<br>'; }
            else if (resolved === ' ') { html += ' '; }
            else { html += resolved; }
          } else {
            if (fromC === '\n' || toC === '\n' || fromC === ' ' || toC === ' ') {
              html += ' ';
            } else {
              const g = GLYPHS[Math.floor(Math.random() * GLYPHS.length)];
              html += `<span class="char-glitch">${g}</span>`;
            }
          }
        }

        textInner.innerHTML = html;
      }

      function onScroll() {
        const scrollY = window.scrollY;
        const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
        const progress = maxScroll > 0 ? scrollY / maxScroll : 0;

        // Scroll indicator + hint fade
        const fadeOut = clamp01(1 - scrollY / (window.innerHeight * 0.3));
        scrollIndicator.style.opacity = fadeOut;
        hintClick.style.opacity = fadeOut * 0.6;

        // Tagline fade
        tagline.style.opacity = remap(progress, 0.10, 0.18, 1, 0);

        /*
         * Text state machine:
         * 0–0.20:       Show hero name (Inter, big)
         * 0.20–0.38:    Scramble A→B
         * 0.38–0.52:    Hold B
         * 0.52–0.70:    Scramble B→A
         * 0.70–1.0:     Show hero name again (on force field)
         */
        if (progress < 0.15) {
          if (currentMode !== 'hero') {
            renderText(TEXT_A, TEXT_A, 1);
            currentMode = 'hero';
          }
        } else if (progress < 0.40) {
          currentMode = 'scrambling-forward';
          const sp = easeInOutCubic(remap(progress, 0.15, 0.40, 0, 1));
          renderText(TEXT_A, TEXT_B, sp);
        } else if (progress < 0.55) {
          if (currentMode !== 'hold-b') {
            renderText(TEXT_A, TEXT_B, 1);
            currentMode = 'hold-b';
          }
        } else if (progress < 0.82) {
          currentMode = 'scrambling-back';
          const sp = easeInOutCubic(remap(progress, 0.55, 0.82, 0, 1));
          renderText(TEXT_B, TEXT_A, sp);
        } else {
          if (currentMode !== 'hero-ff') {
            renderText(TEXT_A, TEXT_A, 1);
            currentMode = 'hero-ff';
          }
        }

        /* ── Force field slide up ── */
        const ffSlide = remap(progress, 0.40, 0.80, 100, 0);
        forcefieldLayer.style.transform = `translateY(${ffSlide}%)`;

        /* ── Tubes clip from bottom ── */
        const tubesClipPct = remap(progress, 0.45, 0.85, 0, 100);
        if (tubesClipPct > 0.5) {
          tubesWrapper.style.clipPath = `inset(0 0 ${tubesClipPct}% 0)`;
        } else {
          tubesWrapper.style.clipPath = '';
        }

      }

      function rafLoop() {
        onScroll();
        requestAnimationFrame(rafLoop);
      }
      requestAnimationFrame(rafLoop);
    })();
  </script>

  <!-- ════════════════════════════════════════════ -->
  <!-- Force Field (vanilla p5.js)                 -->
  <!-- ════════════════════════════════════════════ -->
  <script>
    (function () {
      const container = document.getElementById('forcefield-container');
      if (!container) return;

      const state = {
        hue: 210,
        saturation: 100,
        spacing: 10,
        minStroke: 2,
        maxStroke: 6,
        forceStrength: 27,
        magnifierRadius: 275,
        friction: 0.9,
        restoreSpeed: 0.05,
        threshold: 255,
        density: 2.0,
        invertImage: true,
        invertWireframe: true
      };

      const IMAGE_URL = 'https://cdn.pixabay.com/photo/2024/12/13/20/29/alps-9266131_1280.jpg';

      const sketch = (p) => {
        let originalImg;
        let img;
        let palette = [];
        let points = [];
        let magnifierX = 0, magnifierY = 0;
        const magnifierInertia = 0.1;
        let lastHue = -1, lastSaturation = -1;

        p.preload = () => {
          originalImg = p.loadImage(IMAGE_URL);
        };

        p.setup = () => {
          const w = container.clientWidth || window.innerWidth;
          const h = container.clientHeight || window.innerHeight;
          const cnv = p.createCanvas(w, h);
          cnv.parent(container);
          magnifierX = w / 2;
          magnifierY = h / 2;
          processImage();
          generatePalette();
          generatePoints();
        };

        p.windowResized = () => {
          const w = container.clientWidth || window.innerWidth;
          const h = container.clientHeight || window.innerHeight;
          if (w > 0 && h > 0) {
            p.resizeCanvas(w, h);
            processImage();
            generatePoints();
          }
        };

        function processImage() {
          if (!originalImg) return;
          img = originalImg.get();
          if (p.width > 0 && p.height > 0) {
            img.resize(p.width, p.height);
          }
          img.filter(p.GRAY);
          if (state.invertImage) {
            img.loadPixels();
            for (let i = 0; i < img.pixels.length; i += 4) {
              img.pixels[i] = 255 - img.pixels[i];
              img.pixels[i + 1] = 255 - img.pixels[i + 1];
              img.pixels[i + 2] = 255 - img.pixels[i + 2];
            }
            img.updatePixels();
          }
        }

        function generatePalette() {
          palette = [];
          p.push();
          p.colorMode(p.HSL);
          for (let i = 0; i < 12; i++) {
            let lightness = p.map(i, 0, 11, 95, 5);
            palette.push(p.color(state.hue, state.saturation, lightness));
          }
          p.pop();
          lastHue = state.hue;
          lastSaturation = state.saturation;
        }

        function generatePoints() {
          if (!img) return;
          points = [];
          const sp = Math.max(2, state.spacing);
          for (let y = 0; y < img.height; y += sp) {
            for (let x = 0; x < img.width; x += sp) {
              if (p.random() > state.density) continue;
              const noiseVal = p.noise(x * 0.01, y * 0.01);
              const jitterX = (noiseVal - 0.5) * sp * 1.8;
              const jitterY = (p.noise(x * 0.01 + 500, y * 0.01 + 500) - 0.5) * sp * 1.8;
              const px = x + jitterX;
              const py = y + jitterY;
              points.push({
                pos: p.createVector(px, py),
                originalPos: p.createVector(px, py),
                vel: p.createVector(0, 0)
              });
            }
          }
        }

        p.draw = () => {
          if (!img) return;
          p.background(0);

          if (state.hue !== lastHue || state.saturation !== lastSaturation) {
            generatePalette();
          }

          magnifierX = p.lerp(magnifierX, p.mouseX, magnifierInertia);
          magnifierY = p.lerp(magnifierY, p.mouseY, magnifierInertia);

          for (const pt of points) {
            const dir = p5.Vector.sub(pt.pos, p.createVector(magnifierX, magnifierY));
            const d = dir.mag();
            if (d < state.magnifierRadius) {
              dir.normalize();
              const force = dir.mult(state.forceStrength / Math.max(1, d));
              pt.vel.add(force);
            }
            pt.vel.mult(state.friction);
            const restore = p5.Vector.sub(pt.pos, pt.originalPos).mult(-state.restoreSpeed);
            pt.vel.add(restore);
            pt.pos.add(pt.vel);
          }

          img.loadPixels();
          p.noFill();

          for (const pt of points) {
            const x = pt.pos.x;
            const y = pt.pos.y;
            const d = p.dist(x, y, magnifierX, magnifierY);
            const px = p.constrain(p.floor(x), 0, img.width - 1);
            const py = p.constrain(p.floor(y), 0, img.height - 1);
            const index = (px + py * img.width) * 4;
            const brightness = img.pixels[index];
            if (brightness === undefined) continue;

            const condition = state.invertWireframe
              ? brightness < state.threshold
              : brightness > state.threshold;

            if (condition) {
              let shadeIndex = Math.floor(p.map(brightness, 0, 255, 0, palette.length - 1));
              shadeIndex = p.constrain(shadeIndex, 0, palette.length - 1);
              let strokeSize = p.map(brightness, 0, 255, state.minStroke, state.maxStroke);
              if (d < state.magnifierRadius) {
                strokeSize *= p.map(d, 0, state.magnifierRadius, 2, 1);
              }
              if (palette[shadeIndex]) {
                p.stroke(palette[shadeIndex]);
                p.strokeWeight(strokeSize);
                p.point(x, y);
              }
            }
          }
        };
      };

      new p5(sketch);
    })();
  </script>
</body>
