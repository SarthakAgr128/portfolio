<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sarthak Agrawal</title>
  <meta name="description" content="Sarthak Agrawal - Security Engineer, Problem Solver, Builder">
  <meta name="theme-color" content="#000000">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">

  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #000;
      color: #fff;
    }

    #tubes-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      touch-action: none;
    }

    .content {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      pointer-events: none;
    }

    .name {
      font-size: clamp(3rem, 12vw, 10rem);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: -0.04em;
      line-height: 0.9;
      text-shadow: 0 0 60px rgba(0, 0, 0, 0.8);
      user-select: none;
    }

    .name span {
      display: block;
    }

    .name .first {
      color: #fff;
    }

    .name .last {
      color: rgba(255, 255, 255, 0.6);
    }

    .tagline {
      margin-top: 1.5rem;
      font-size: clamp(0.875rem, 2vw, 1.25rem);
      font-weight: 400;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .hint {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      color: rgba(255, 255, 255, 0.3);
      font-size: 0.6875rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      animation: pulse 2s ease-in-out infinite;
      pointer-events: none;
    }

    .hint svg {
      width: 20px;
      height: 20px;
      opacity: 0.5;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.6; }
    }

    .back-link {
      position: fixed;
      top: 2rem;
      left: 2rem;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.25rem;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 9999px;
      color: #fff;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.3s ease;
      pointer-events: auto;
    }

    .back-link:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
    }

    .back-link svg {
      width: 16px;
      height: 16px;
      transition: transform 0.3s ease;
    }

    .back-link:hover svg {
      transform: translateX(-3px);
    }

    @media (max-width: 768px) {
      .back-link {
        top: 1rem;
        left: 1rem;
        padding: 0.625rem;
      }

      .back-link span {
        display: none;
      }

      .tagline {
        padding: 0 1rem;
      }
    }
  </style>
</head>
<body>
  <!-- Tubes 3D Background -->
  <canvas id="tubes-canvas" aria-hidden="true"></canvas>

  <!-- Back Link -->
  <a href="../" class="back-link">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
    <span>Back</span>
  </a>

  <!-- Content -->
  <div class="content">
    <h1 class="name">
      <span class="first">Sarthak</span>
      <span class="last">Agrawal</span>
    </h1>
    <p class="tagline">Security Engineer · Problem Solver · Builder</p>
  </div>

  <!-- Hint -->
  <div class="hint">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 5v14M5 12l7-7 7 7"/>
    </svg>
    <span>Click to change colors</span>
  </div>

  <script type="module">
    const TubesBackground = {
      app: null,
      canvas: null,
      currentColors: {
        tubes: ['#f967fb', '#53bc28', '#6958d5'],
        lights: ['#83f36e', '#fe8a2e', '#ff008a', '#60aed5']
      },

      async init() {
        this.canvas = document.getElementById('tubes-canvas');
        if (!this.canvas) return;

        try {
          const module = await import('https://cdn.jsdelivr.net/npm/threejs-components@0.0.19/build/cursors/tubes1.min.js');
          const TubesCursor = module.default;

          this.app = TubesCursor(this.canvas, {
            tubes: {
              colors: this.currentColors.tubes,
              lights: {
                intensity: 200,
                colors: this.currentColors.lights
              }
            }
          });

          this.bindClickHandler();
          console.log('%c🎨 Tubes initialized', 'font-size: 12px; color: #f967fb;');
        } catch (error) {
          console.warn('Tubes not available:', error);
          document.body.style.background = 'linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f1a 100%)';
        }
      },

      randomColors(count) {
        const colors = [];
        const hueRanges = [[280, 320], [100, 160], [200, 260], [0, 40]];
        
        for (let i = 0; i < count; i++) {
          const range = hueRanges[i % hueRanges.length];
          const hue = Math.floor(Math.random() * (range[1] - range[0]) + range[0]);
          const sat = Math.floor(Math.random() * 30 + 70);
          const light = Math.floor(Math.random() * 20 + 50);
          colors.push(`hsl(${hue}, ${sat}%, ${light}%)`);
        }
        return colors;
      },

      hslToHex(hsl) {
        const match = hsl.match(/hsl\((\d+),\s*(\d+)%,\s*(\d+)%\)/);
        if (!match) return hsl;
        
        let [, h, s, l] = match.map(Number);
        s /= 100; l /= 100;

        const c = (1 - Math.abs(2 * l - 1)) * s;
        const x = c * (1 - Math.abs((h / 60) % 2 - 1));
        const m = l - c / 2;
        let r = 0, g = 0, b = 0;

        if (h < 60) { r = c; g = x; }
        else if (h < 120) { r = x; g = c; }
        else if (h < 180) { g = c; b = x; }
        else if (h < 240) { g = x; b = c; }
        else if (h < 300) { r = x; b = c; }
        else { r = c; b = x; }

        return '#' + [r, g, b].map(v => 
          Math.round((v + m) * 255).toString(16).padStart(2, '0')
        ).join('');
      },

      randomize() {
        if (!this.app) return;
        const tubeColors = this.randomColors(3).map(c => this.hslToHex(c));
        const lightColors = this.randomColors(4).map(c => this.hslToHex(c));
        this.app.tubes.setColors(tubeColors);
        this.app.tubes.setLightsColors(lightColors);
      },

      bindClickHandler() {
        document.addEventListener('click', (e) => {
          if (e.target.closest('a')) return;
          this.randomize();
        });
      }
    };

    TubesBackground.init();
  </script>
</body>
</html>
