<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sarthak Agrawal</title>
  <meta name="description" content="Sarthak Agrawal - Security Engineer, Problem Solver, Builder">
  <meta name="theme-color" content="#000000">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">

  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      height: 100%;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #000;
      color: #fff;
      overflow-x: hidden;
    }

    /* ─── Scroll spacer: total scrollable height ─── */
    .scroll-spacer {
      height: 400vh;
      position: relative;
    }

    /* ─── LAYER 1: Tubes — fixed, always behind ─── */
    #tubes-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      touch-action: none;
    }

    /* ─── LAYER 2: Hero text overlay — fixed, scroll-driven ─── */
    .hero-overlay {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      pointer-events: none;
    }

    .name {
      font-size: clamp(3rem, 12vw, 10rem);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: -0.04em;
      line-height: 0.9;
      text-shadow: 0 0 60px rgba(0, 0, 0, 0.8);
      user-select: none;
    }

    .name span {
      display: block;
    }

    .name .first {
      color: #fff;
    }

    .name .last {
      color: rgba(255, 255, 255, 0.6);
    }

    .tagline {
      margin-top: 1.5rem;
      font-size: clamp(0.875rem, 2vw, 1.25rem);
      font-weight: 400;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* ─── Scramble text (replaces name during transition) ─── */
    .scramble-container {
      position: fixed;
      inset: 0;
      z-index: 11;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      padding: 0 2rem;
    }

    .scramble-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(1rem, 2.8vw, 2.25rem);
      font-weight: 400;
      color: #fff;
      letter-spacing: 0.02em;
      line-height: 1.4;
      white-space: pre-wrap;
    }

    .scramble-text .char {
      display: inline-block;
      transition: none;
    }

    .scramble-text .char.glitch {
      color: rgba(255, 255, 255, 0.3);
    }

    .hint {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 15;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      color: rgba(255, 255, 255, 0.3);
      font-size: 0.6875rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      animation: pulse 2s ease-in-out infinite;
      pointer-events: none;
    }

    .hint svg {
      width: 20px;
      height: 20px;
      opacity: 0.5;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.6; }
    }

    .scroll-indicator {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      pointer-events: none;
    }

    .scroll-indicator span {
      font-size: 0.625rem;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      color: rgba(255,255,255,0.4);
    }

    .scroll-indicator .scroll-line {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.4), transparent);
      animation: scrollPulse 2s ease-in-out infinite;
    }

    @keyframes scrollPulse {
      0%, 100% { transform: scaleY(1); opacity: 0.4; }
      50% { transform: scaleY(1.3); opacity: 0.8; }
    }

    .back-link {
      position: fixed;
      top: 2rem;
      left: 2rem;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.25rem;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 9999px;
      color: #fff;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.3s ease;
      pointer-events: auto;
    }

    .back-link:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
    }

    .back-link svg {
      width: 16px;
      height: 16px;
      transition: transform 0.3s ease;
    }

    .back-link:hover svg {
      transform: translateX(-3px);
    }

    /* ─── LAYER 3: Force field — slides up from bottom ─── */
    .forcefield-layer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: 100vh;
      z-index: 5;
      transform: translateY(100%);
      will-change: transform;
    }

    #forcefield-container {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #forcefield-container canvas {
      display: block;
    }

    /* ─── Clip mask: used to split-screen the tubes ─── */
    .tubes-clip {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      will-change: clip-path;
      clip-path: inset(0 0 0 0);
    }

    /* ─── Force field name overlay ─── */
    .ff-name-overlay {
      position: fixed;
      inset: 0;
      z-index: 12;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      pointer-events: none;
      opacity: 0;
    }

    .ff-name {
      font-size: clamp(3rem, 12vw, 10rem);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: -0.04em;
      line-height: 0.9;
      user-select: none;
      color: #fff;
      text-shadow: 0 0 80px rgba(0, 0, 0, 0.9);
    }

    .ff-name span {
      display: block;
    }

    .ff-name .last {
      color: rgba(255, 255, 255, 0.6);
    }

    /* ─── Controls ─── */
    .ff-controls {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      pointer-events: auto;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    .ff-controls.visible {
      opacity: 1;
    }

    .ff-controls-inner {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding: 1rem 1.5rem;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 1rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .ff-control-group {
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
    }

    .ff-control-label {
      font-size: 0.625rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.35);
      display: flex;
      align-items: center;
      gap: 0.375rem;
    }

    .ff-control-label svg {
      width: 10px;
      height: 10px;
    }

    .ff-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 5rem;
      height: 2px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    .ff-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.7);
      cursor: pointer;
      transition: background 0.2s;
    }

    .ff-slider::-webkit-slider-thumb:hover {
      background: #fff;
    }

    .ff-divider {
      width: 1px;
      height: 2rem;
      background: rgba(255,255,255,0.08);
    }

    .ff-btn {
      padding: 0.625rem;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ff-btn:hover {
      background: rgba(255,255,255,0.15);
      color: #fff;
    }

    .ff-btn svg {
      width: 16px;
      height: 16px;
      transition: transform 0.5s ease;
    }

    .ff-btn:hover svg {
      transform: rotate(180deg);
    }

    @media (max-width: 768px) {
      .back-link {
        top: 1rem;
        left: 1rem;
        padding: 0.625rem;
      }

      .back-link span {
        display: none;
      }

      .tagline {
        padding: 0 1rem;
      }

      .ff-controls-inner {
        gap: 1rem;
        padding: 0.75rem 1rem;
      }

      .ff-slider {
        width: 3.5rem;
      }

      .scramble-text {
        font-size: clamp(0.875rem, 4vw, 1.5rem);
      }
    }
  </style>

  <!-- ════════════════════════════════════════════ -->
  <!-- Tubes (unchanged logic)                     -->
  <!-- ════════════════════════════════════════════ -->
  <script type="module">
    const TubesBackground = {
      app: null,
      canvas: null,
      currentColors: {
        tubes: ['#f967fb', '#53bc28', '#6958d5'],
        lights: ['#83f36e', '#fe8a2e', '#ff008a', '#60aed5']
      },

      async init() {
        this.canvas = document.getElementById('tubes-canvas');
        if (!this.canvas) return;

        try {
          const module = await import('https://cdn.jsdelivr.net/npm/threejs-components@0.0.19/build/cursors/tubes1.min.js');
          const TubesCursor = module.default;

          this.app = TubesCursor(this.canvas, {
            tubes: {
              colors: this.currentColors.tubes,
              lights: {
                intensity: 200,
                colors: this.currentColors.lights
              }
            }
          });

          this.bindClickHandler();
        } catch (error) {
          console.warn('Tubes not available:', error);
          document.body.style.background = 'linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f1a 100%)';
        }
      },

      randomColors(count) {
        const colors = [];
        const hueRanges = [[280, 320], [100, 160], [200, 260], [0, 40]];
        for (let i = 0; i < count; i++) {
          const range = hueRanges[i % hueRanges.length];
          const hue = Math.floor(Math.random() * (range[1] - range[0]) + range[0]);
          const sat = Math.floor(Math.random() * 30 + 70);
          const light = Math.floor(Math.random() * 20 + 50);
          colors.push(`hsl(${hue}, ${sat}%, ${light}%)`);
        }
        return colors;
      },

      hslToHex(hsl) {
        const match = hsl.match(/hsl\((\d+),\s*(\d+)%,\s*(\d+)%\)/);
        if (!match) return hsl;
        let [, h, s, l] = match.map(Number);
        s /= 100; l /= 100;
        const c = (1 - Math.abs(2 * l - 1)) * s;
        const x = c * (1 - Math.abs((h / 60) % 2 - 1));
        const m = l - c / 2;
        let r = 0, g = 0, b = 0;
        if (h < 60) { r = c; g = x; }
        else if (h < 120) { r = x; g = c; }
        else if (h < 180) { g = c; b = x; }
        else if (h < 240) { g = x; b = c; }
        else if (h < 300) { r = x; b = c; }
        else { r = c; b = x; }
        return '#' + [r, g, b].map(v =>
          Math.round((v + m) * 255).toString(16).padStart(2, '0')
        ).join('');
      },

      randomize() {
        if (!this.app) return;
        const tubeColors = this.randomColors(3).map(c => this.hslToHex(c));
        const lightColors = this.randomColors(4).map(c => this.hslToHex(c));
        this.app.tubes.setColors(tubeColors);
        this.app.tubes.setLightsColors(lightColors);
      },

      bindClickHandler() {
        document.addEventListener('click', (e) => {
          if (e.target.closest('a')) return;
          if (e.target.closest('.ff-controls')) return;
          this.randomize();
        });
      }
    };

    TubesBackground.init();
  </script>

  <!-- ════════════════════════════════════════════ -->
  <!-- Scroll choreography + text scramble         -->
  <!-- ════════════════════════════════════════════ -->
  <script>
    (function () {
      const GLYPHS = '0123456789ABCDEFabcdef!@#$%^&*<>{}[]|/\\~';
      const TEXT_A = 'SARTHAK AGRAWAL';
      const TEXT_B = "Who said cyber security nerds can't be creative?";

      const heroOverlay = document.getElementById('hero-overlay');
      const scrambleContainer = document.getElementById('scramble-container');
      const scrambleText = document.getElementById('scramble-text');
      const hintClick = document.getElementById('hint-click');
      const scrollIndicator = document.getElementById('scroll-indicator');
      const forcefieldLayer = document.getElementById('forcefield-layer');
      const ffNameOverlay = document.getElementById('ff-name-overlay');
      const ffControls = document.getElementById('ff-controls');
      const tubesClip = document.getElementById('tubes-clip');

      /*
       * SCROLL TIMELINE (over 400vh):
       *
       * 0vh–100vh (progress 0–0.25):
       *   Hero state. Name visible. Tubes full screen. No changes.
       *
       * 100vh–200vh (progress 0.25–0.5):
       *   "Scramble out" phase.
       *   - Hero name + tagline fade out (0.25–0.30)
       *   - Scramble container fades in (0.28–0.33)
       *   - Text scrambles from TEXT_A → TEXT_B across 0.30–0.48
       *   - At 0.45, force field begins sliding up from bottom
       *
       * 200vh–300vh (progress 0.5–0.75):
       *   Split-screen phase.
       *   - Tubes get clip-path to show only upper portion
       *   - Force field visible in lower portion, rising
       *   - Text scrambles back: TEXT_B → TEXT_A across 0.52–0.70
       *   - Scramble container fades out (0.68–0.73)
       *   - ff-name-overlay fades in (0.72–0.78)
       *
       * 300vh–400vh (progress 0.75–1.0):
       *   Force field full screen.
       *   - Force field covers 100% viewport
       *   - Tubes fully clipped away
       *   - Name shows on force field
       *   - Controls visible
       */

      let lastProgress = -1;
      let scrambleFrame = null;
      let currentScrambleTarget = '';
      let currentScrambleSource = '';
      let scrambleProgress = 0;

      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      function clamp01(v) {
        return Math.max(0, Math.min(1, v));
      }

      function remap(value, inLow, inHigh, outLow, outHigh) {
        const t = clamp01((value - inLow) / (inHigh - inLow));
        return lerp(outLow, outHigh, t);
      }

      function easeInOutCubic(t) {
        return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
      }

      function renderScramble(from, to, progress) {
        const maxLen = Math.max(from.length, to.length);
        const padFrom = from.padEnd(maxLen);
        const padTo = to.padEnd(maxLen);
        let html = '';

        for (let i = 0; i < maxLen; i++) {
          const charProgress = clamp01((progress - (i / maxLen) * 0.5) / 0.5);

          if (charProgress <= 0) {
            const c = padFrom[i];
            html += c === ' ' ? ' ' : `<span class="char">${c}</span>`;
          } else if (charProgress >= 1) {
            const c = padTo[i];
            html += c === ' ' ? ' ' : `<span class="char">${c}</span>`;
          } else {
            const g = GLYPHS[Math.floor(Math.random() * GLYPHS.length)];
            html += `<span class="char glitch">${g}</span>`;
          }
        }

        scrambleText.innerHTML = html;
      }

      function onScroll() {
        const scrollY = window.scrollY;
        const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
        const progress = maxScroll > 0 ? scrollY / maxScroll : 0;

        // Scroll indicator fade
        const indicatorOpacity = clamp01(1 - scrollY / (window.innerHeight * 0.3));
        scrollIndicator.style.opacity = indicatorOpacity;

        // Hint fade (same timing)
        hintClick.style.opacity = indicatorOpacity * 0.6;

        /* ── Phase 1: Hero (0–0.25) ── */
        const heroOpacity = remap(progress, 0.22, 0.30, 1, 0);
        heroOverlay.style.opacity = heroOpacity;

        /* ── Phase 2: Scramble forward (0.25–0.50) ── */
        const scrambleInOpacity = progress < 0.5
          ? remap(progress, 0.26, 0.32, 0, 1)
          : remap(progress, 0.68, 0.74, 1, 0);
        scrambleContainer.style.opacity = scrambleInOpacity;

        if (progress >= 0.28 && progress < 0.50) {
          const sp = remap(progress, 0.28, 0.48, 0, 1);
          renderScramble(TEXT_A, TEXT_B, easeInOutCubic(sp));
        } else if (progress >= 0.50 && progress < 0.74) {
          const sp = remap(progress, 0.50, 0.70, 0, 1);
          renderScramble(TEXT_B, TEXT_A, easeInOutCubic(sp));
        } else if (progress < 0.28) {
          renderScramble(TEXT_A, TEXT_A, 1);
        }

        /* ── Phase 3: Force field slide up (0.40–0.80) ── */
        const ffSlide = remap(progress, 0.40, 0.80, 100, 0);
        forcefieldLayer.style.transform = `translateY(${ffSlide}%)`;

        // Tubes clip: shrink from bottom as force field rises
        const tubesClipBottom = remap(progress, 0.45, 0.85, 0, 100);
        if (tubesClipBottom > 0) {
          tubesClip.style.clipPath = `inset(0 0 ${tubesClipBottom}% 0)`;
          tubesClip.style.display = 'block';
        } else {
          tubesClip.style.clipPath = 'inset(0 0 0 0)';
        }

        /* ── Phase 4: FF name + controls (0.75–1.0) ── */
        const ffNameOpacity = remap(progress, 0.74, 0.82, 0, 1);
        ffNameOverlay.style.opacity = ffNameOpacity;

        if (progress > 0.78) {
          ffControls.classList.add('visible');
        } else {
          ffControls.classList.remove('visible');
        }

        lastProgress = progress;
      }

      function rafLoop() {
        onScroll();
        requestAnimationFrame(rafLoop);
      }

      requestAnimationFrame(rafLoop);
    })();
  </script>

  <!-- ════════════════════════════════════════════ -->
  <!-- Force Field (vanilla p5.js port)            -->
  <!-- ════════════════════════════════════════════ -->
  <script>
    (function () {
      const container = document.getElementById('forcefield-container');
      if (!container) return;

      const state = {
        hue: 210,
        saturation: 100,
        spacing: 10,
        minStroke: 2,
        maxStroke: 6,
        forceStrength: 10,
        magnifierRadius: 150,
        friction: 0.9,
        restoreSpeed: 0.05,
        threshold: 255,
        density: 2.0,
        invertImage: true,
        invertWireframe: true
      };

      const IMAGE_URL = 'https://cdn.pixabay.com/photo/2024/12/13/20/29/alps-9266131_1280.jpg';

      const sketch = (p) => {
        let originalImg;
        let img;
        let palette = [];
        let points = [];
        let magnifierX = 0, magnifierY = 0;
        const magnifierInertia = 0.1;
        let lastHue = -1, lastSaturation = -1;

        p.preload = () => {
          originalImg = p.loadImage(IMAGE_URL);
        };

        p.setup = () => {
          const w = container.clientWidth || window.innerWidth;
          const h = container.clientHeight || window.innerHeight;
          const cnv = p.createCanvas(w, h);
          cnv.parent(container);
          magnifierX = w / 2;
          magnifierY = h / 2;
          processImage();
          generatePalette();
          generatePoints();
        };

        p.windowResized = () => {
          const w = container.clientWidth || window.innerWidth;
          const h = container.clientHeight || window.innerHeight;
          if (w > 0 && h > 0) {
            p.resizeCanvas(w, h);
            processImage();
            generatePoints();
          }
        };

        function processImage() {
          if (!originalImg) return;
          img = originalImg.get();
          if (p.width > 0 && p.height > 0) {
            img.resize(p.width, p.height);
          }
          img.filter(p.GRAY);
          if (state.invertImage) {
            img.loadPixels();
            for (let i = 0; i < img.pixels.length; i += 4) {
              img.pixels[i] = 255 - img.pixels[i];
              img.pixels[i + 1] = 255 - img.pixels[i + 1];
              img.pixels[i + 2] = 255 - img.pixels[i + 2];
            }
            img.updatePixels();
          }
        }

        function generatePalette() {
          palette = [];
          p.push();
          p.colorMode(p.HSL);
          for (let i = 0; i < 12; i++) {
            let lightness = p.map(i, 0, 11, 95, 5);
            palette.push(p.color(state.hue, state.saturation, lightness));
          }
          p.pop();
          lastHue = state.hue;
          lastSaturation = state.saturation;
        }

        function generatePoints() {
          if (!img) return;
          points = [];
          const sp = Math.max(2, state.spacing);

          for (let y = 0; y < img.height; y += sp) {
            for (let x = 0; x < img.width; x += sp) {
              if (p.random() > state.density) continue;

              // Organic jitter: noise-based offset so particles never sit on a grid
              const noiseVal = p.noise(x * 0.01, y * 0.01);
              const jitterX = (noiseVal - 0.5) * sp * 1.8;
              const jitterY = (p.noise(x * 0.01 + 500, y * 0.01 + 500) - 0.5) * sp * 1.8;
              const px = x + jitterX;
              const py = y + jitterY;

              points.push({
                pos: p.createVector(px, py),
                originalPos: p.createVector(px, py),
                vel: p.createVector(0, 0)
              });
            }
          }
        }

        p.draw = () => {
          if (!img) return;
          p.background(0);

          if (state.hue !== lastHue || state.saturation !== lastSaturation) {
            generatePalette();
          }

          magnifierX = p.lerp(magnifierX, p.mouseX, magnifierInertia);
          magnifierY = p.lerp(magnifierY, p.mouseY, magnifierInertia);

          for (const pt of points) {
            const dir = p5.Vector.sub(pt.pos, p.createVector(magnifierX, magnifierY));
            const d = dir.mag();
            if (d < state.magnifierRadius) {
              dir.normalize();
              const force = dir.mult(state.forceStrength / Math.max(1, d));
              pt.vel.add(force);
            }
            pt.vel.mult(state.friction);
            const restore = p5.Vector.sub(pt.pos, pt.originalPos).mult(-state.restoreSpeed);
            pt.vel.add(restore);
            pt.pos.add(pt.vel);
          }

          img.loadPixels();
          p.noFill();

          for (const pt of points) {
            const x = pt.pos.x;
            const y = pt.pos.y;
            const d = p.dist(x, y, magnifierX, magnifierY);
            const px = p.constrain(p.floor(x), 0, img.width - 1);
            const py = p.constrain(p.floor(y), 0, img.height - 1);
            const index = (px + py * img.width) * 4;
            const brightness = img.pixels[index];
            if (brightness === undefined) continue;

            const condition = state.invertWireframe
              ? brightness < state.threshold
              : brightness > state.threshold;

            if (condition) {
              let shadeIndex = Math.floor(p.map(brightness, 0, 255, 0, palette.length - 1));
              shadeIndex = p.constrain(shadeIndex, 0, palette.length - 1);
              let strokeSize = p.map(brightness, 0, 255, state.minStroke, state.maxStroke);

              if (d < state.magnifierRadius) {
                strokeSize *= p.map(d, 0, state.magnifierRadius, 2, 1);
              }

              if (palette[shadeIndex]) {
                p.stroke(palette[shadeIndex]);
                p.strokeWeight(strokeSize);
                p.point(x, y);
              }
            }
          }
        };
      };

      new p5(sketch);

      // Controls
      document.getElementById('ff-hue')?.addEventListener('input', (e) => {
        state.hue = parseInt(e.target.value);
      });
      document.getElementById('ff-radius')?.addEventListener('input', (e) => {
        state.magnifierRadius = parseInt(e.target.value);
      });
      document.getElementById('ff-force')?.addEventListener('input', (e) => {
        state.forceStrength = parseInt(e.target.value);
      });
      document.getElementById('ff-randomize')?.addEventListener('click', (e) => {
        e.stopPropagation();
        state.hue = Math.floor(Math.random() * 360);
        state.minStroke = parseFloat((Math.random() * 3 + 1).toFixed(1));
        state.maxStroke = parseFloat((Math.random() * 8 + 4).toFixed(1));
        state.magnifierRadius = Math.floor(Math.random() * 100 + 100);
        document.getElementById('ff-hue').value = state.hue;
        document.getElementById('ff-radius').value = state.magnifierRadius;
      });
    })();
  </script>
